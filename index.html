<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Quiz Application</title>
</head>

<body>
    <div class="w-full flex justify-center items-center flex-col min-h-screen bg-gray-100 p-4">
        <h1 class="text-3xl font-bold mb-6 text-blue-600">Quiz Application</h1>
        
        <button type="button" id="start-quiz-button" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg mb-4 transition duration-300">
            Start Quiz
        </button>

        <div class="w-full max-w-2xl bg-white rounded-lg shadow-lg p-6" id="question-container" style="display: none;">
            <div class="mb-4">
                <span id="question-number" class="text-sm text-gray-500">Question 1 of 4</span>
                <p id="question" class="text-xl font-semibold mt-2"></p>
            </div>
            
            <div class="flex flex-col gap-2" id="question-options-container">
                <!-- Options space -->
            </div>
            
            <div class="flex justify-between items-center mt-6">
                <button type="button" id="prev-button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition duration-300" disabled>
                    Previous
                </button>
                
                <span id="score-display" class="text-sm font-medium text-gray-600">Score: 0</span>
                
                <button type="button" id="next-button" class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg disabled:opacity-50 disabled:cursor-not-allowed transition duration-300" disabled>
                    Next
                </button>
            </div>
        </div>
        
        <div id="result-container" style="display: none;" class="w-full max-w-2xl bg-white rounded-lg shadow-lg p-6">
            <div class="text-center mb-6">
                <h2 class="text-2xl font-bold mb-4">Quiz Completed!</h2>
                <p class="text-xl mb-2">Your Score: <span id="final-score" class="text-blue-600 font-bold">0</span></p>
                <p class="text-gray-600">Correct Answers: <span id="correct-count">0</span> out of <span id="total-questions">0</span></p>
                <div class="mt-4 flex justify-center gap-2">
                    <button type="button" id="restart-button" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-lg transition duration-300">
                        Restart Quiz
                    </button>
                    <button type="button" id="review-button" class="bg-gray-600 hover:bg-gray-700 text-white font-bold py-2 px-6 rounded-lg transition duration-300">
                        Review Answers
                    </button>
                </div>
            </div>
            
            <div id="review-container" style="display: none;" class="mt-6 border-t-2 border-gray-200 pt-6">
                <h3 class="text-xl font-bold mb-4 text-gray-800">Answer Review</h3>
                <div id="review-questions-container" class="space-y-6">
                    <!-- Review questions will be rendered here -->
                </div>
            </div>
        </div>
    </div>

    <script src="./index.js"></script>

</body>

</html>
